name: "Deploy — Staging"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for this deployment (e.g. QA approved, ticket PROJ-142)'
        required: false

jobs:
  deploy:
    name: "Deploy to Staging"
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log deployment reason
        run: |
          echo "=== STAGING DEPLOY ==="
          echo "Triggered by: ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason || 'no reason provided' }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: Copy app files to Staging VM
        run: |
          scp -i /home/student/staging_deploy_key -o StrictHostKeyChecking=no -r \
            app/ Dockerfile .dockerignore docker-compose.yml \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/app/

      - name: Deploy Flask container on Staging
        run: |
          ssh -i /home/student/staging_deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
          set -e
          cd /opt/app
          export DEPLOY_TIME="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          export GITHUB_SHA="${{ github.sha }}"
          export GITHUB_REF_NAME="${{ github.ref_name }}"
          export HOST_PORT=5001
          export ENVIRONMENT=staging
          echo "=== Deploying ${GITHUB_SHA:0:7} to staging ==="
          sudo docker compose down --remove-orphans
          sudo HOST_PORT="${HOST_PORT}" ENVIRONMENT="${ENVIRONMENT}" \
               DEPLOY_TIME="${DEPLOY_TIME}" GITHUB_SHA="${GITHUB_SHA}" \
               GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
               docker compose up -d --build
          echo "=== Staging deploy complete ==="
          sudo docker compose ps
          EOF

      - name: Smoke test
        run: |
          sleep 4
          curl -f "http://${{ secrets.STAGING_HOST }}:5001/health" | python3 -m json.tool
          echo "=== Staging smoke test passed ==="